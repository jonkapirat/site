<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Guitar tuner</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap");

    :root {
      --bg: #F5F5F2;
      --ink: #212325;
      --surface: #ffffff;
      --stage-width: 380px;
      --ring-size: 48px;
      --ring-gap: 8px;
      --strings-width: 328px;
      --string-width: 1px;
      --border-width: 1px;
      --dot-size: 18px;
      --ring-center-y: clamp(340px, 51.1svh, 392px);
      --card-width: 124px;
      --card-height: 81px;
      --card-gap: 8px;
      --pill-height: 36px;
      --safe-top: max(env(safe-area-inset-top), 0px);
      --safe-bottom: max(env(safe-area-inset-bottom), 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100svh;
    }

    button,
    summary {
      font: inherit;
    }

    .app {
      min-height: 100svh;
      background: var(--bg);
    }

    .stage {
      position: relative;
      width: min(100vw, var(--stage-width));
      min-height: 100svh;
      margin: 0 auto;
      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }

    .top-pill {
      position: absolute;
      top: calc(var(--safe-top) + 20px);
      z-index: 20;
      height: var(--pill-height);
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      user-select: none;
      box-shadow: none;
      transition: transform 120ms ease;
    }

    .microphone-button {
      left: 10px;
      width: 151px;
      min-width: 0;
      padding: 0 16px;
      cursor: pointer;
    }

    .microphone-button:active,
    .tuning-dropdown summary:active,
    .tuning-option:active {
      transform: scale(0.985);
    }

    .tuning-dropdown {
      position: absolute;
      top: calc(var(--safe-top) + 20px);
      right: 10px;
      z-index: 25;
      min-width: 154px;
    }

    .tuning-dropdown summary {
      list-style: none;
      cursor: pointer;
      width: 154px;
      min-width: 0;
      padding: 0 34px 0 16px;
      justify-content: flex-start;
      outline: none;
      position: relative;
    }

    .tuning-dropdown summary::-webkit-details-marker {
      display: none;
    }

    .tuning-label {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tuning-caret {
      position: absolute;
      right: 15px;
      top: 50%;
      width: 10px;
      height: 6px;
      transform: translateY(-50%);
      transition: transform 160ms ease;
      pointer-events: none;
    }

    .tuning-caret::before,
    .tuning-caret::after {
      content: "";
      position: absolute;
      top: 1px;
      width: 7px;
      height: 1px;
      background: #ffffff;
    }

    .tuning-caret::before {
      left: -1px;
      transform: rotate(45deg);
      transform-origin: left center;
    }

    .tuning-caret::after {
      right: -1px;
      transform: rotate(-45deg);
      transform-origin: right center;
    }

    .tuning-dropdown[open] .tuning-caret {
      transform: translateY(-50%) rotate(180deg);
    }

    .tuning-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: min(272px, calc(100vw - 20px));
      max-height: min(60svh, 430px);
      overflow: auto;
      padding: 8px;
      border: var(--border-width) solid var(--ink);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 10px 24px rgba(33, 35, 37, 0.08);
    }

    .tuning-option {
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
      padding: 10px 12px;
      cursor: pointer;
      display: block;
    }

    .tuning-option[aria-current="true"] {
      background: rgba(33, 35, 37, 0.08);
    }

    .strings-layer {
      position: absolute;
      inset: 0;
      left: 50%;
      width: var(--strings-width);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(6, var(--ring-size));
      column-gap: var(--ring-gap);
      z-index: 1;
    }

    .string-column {
      position: relative;
      display: block;
      width: 100%;
      min-height: 100svh;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .string-column:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }

    .string-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: var(--string-width);
      background: var(--ink);
      transform: translateX(-50%);
      transform-origin: center center;
      will-change: transform;
      z-index: 0;
    }

    .string-column.is-vibrating .string-line {
      animation: string-vibrate 130ms linear infinite;
    }

    .ring {
      position: absolute;
      left: 50%;
      top: var(--ring-center-y);
      width: var(--ring-size);
      height: var(--ring-size);
      transform: translate(-50%, -50%);
      border: var(--border-width) solid var(--ink);
      border-radius: 50%;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      z-index: 2;
      transition: background 120ms ease, color 120ms ease;
    }

    .string-column.is-selected .ring {
      background: var(--ink);
      color: #ffffff;
    }

    .tuning-indicator {
      position: absolute;
      left: 50%;
      width: var(--dot-size);
      height: var(--dot-size);
      transform: translateX(-50%);
      border: var(--border-width) solid var(--ink);
      border-radius: 50%;
      background: var(--bg);
      opacity: 0;
      z-index: 1;
      transition: top 120ms ease, opacity 120ms ease, background 120ms ease, transform 120ms ease;
    }

    .string-column.is-selected.show-indicator .tuning-indicator {
      opacity: 1;
    }

    .string-column.indicator-below .tuning-indicator {
      top: calc(var(--ring-center-y) + 28px);
    }

    .string-column.indicator-above .tuning-indicator {
      top: calc(var(--ring-center-y) - 46px);
    }

    .string-column.indicator-neutral .tuning-indicator {
      top: calc(var(--ring-center-y) + 28px);
    }

    .string-column.indicator-center .tuning-indicator {
      top: calc(var(--ring-center-y) + 28px);
      background: var(--ink);
      transform: translateX(-50%) scale(0.78);
    }

    .readout-stack {
      position: absolute;
      left: 50%;
      top: calc(var(--ring-center-y) + 178px);
      transform: translateX(-50%);
      width: var(--card-width);
      display: grid;
      gap: var(--card-gap);
      z-index: 10;
      pointer-events: none;
    }

    .readout-card {
      width: 100%;
      min-height: var(--card-height);
      background: var(--surface);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 10px;
      text-align: center;
    }

    .readout-card.secondary {
      gap: 6px;
    }

    .readout-primary {
      font-size: 24px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    .readout-secondary {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes string-vibrate {
      0% {
        transform: translateX(-50%);
      }
      20% {
        transform: translateX(calc(-50% - 1px));
      }
      50% {
        transform: translateX(calc(-50% + 1.5px));
      }
      80% {
        transform: translateX(calc(-50% - 0.75px));
      }
      100% {
        transform: translateX(-50%);
      }
    }

    @media (max-width: 359px) {
      .top-pill {
        font-size: 16px;
      }

      .microphone-button,
      .tuning-dropdown summary {
        min-width: 0;
        padding-inline: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0ms !important;
        transition-duration: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="Gitarrstämmare">
      <button id="microphoneButton" class="top-pill microphone-button" type="button">Activate microphone</button>

      <details id="tuningDropdown" class="tuning-dropdown">
        <summary class="top-pill" aria-label="Välj tuning">
          <span id="tuningLabel" class="tuning-label">Standard tuning</span>
          <span class="tuning-caret" aria-hidden="true"></span>
        </summary>
        <div id="tuningMenu" class="tuning-menu" role="listbox" aria-label="Tillgängliga tunings"></div>
      </details>

      <section id="stringsLayer" class="strings-layer" aria-label="Gitarrens sex strängar"></section>

      <section class="readout-stack" aria-live="polite">
        <article class="readout-card primary">
          <div id="frequencyValue" class="readout-primary">0.0</div>
          <div id="referenceValue" class="readout-secondary">E2 82.41 Hz</div>
        </article>
        <article class="readout-card secondary">
          <div class="readout-secondary">Ton nu</div>
          <div id="noteValue" class="readout-primary">—</div>
        </article>
      </section>

      <p id="liveStatus" class="sr-only" aria-live="polite">Välj en sträng och aktivera mikrofonen.</p>
    </section>
  </main>

  <script>
    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const TUNINGS = [
      {
        id: "standard",
        buttonLabel: "Standard tuning",
        menuLabel: "Standard tuning (EADGBE)",
        notes: ["E2", "A2", "D3", "G3", "B3", "E4"],
      },
      {
        id: "drop-d",
        buttonLabel: "Drop D tuning",
        menuLabel: "Drop D tuning (DADGBE)",
        notes: ["D2", "A2", "D3", "G3", "B3", "E4"],
      },
      {
        id: "drop-c",
        buttonLabel: "Drop C tuning",
        menuLabel: "Drop C tuning (CGCFAD)",
        notes: ["C2", "G2", "C3", "F3", "A3", "D4"],
      },
      {
        id: "double-drop-d",
        buttonLabel: "Double Drop D",
        menuLabel: "Double Drop D tuning (DADGBD)",
        notes: ["D2", "A2", "D3", "G3", "B3", "D4"],
      },
      {
        id: "dadgad",
        buttonLabel: "DADGAD",
        menuLabel: "DADGAD (Celtic) tuning",
        notes: ["D2", "A2", "D3", "G3", "A3", "D4"],
      },
      {
        id: "nashville",
        buttonLabel: "Nashville tuning",
        menuLabel: "Nashville tuning (E’A’D’G’BE)",
        notes: ["E3", "A3", "D4", "G4", "B3", "E4"],
      },
      {
        id: "open-e",
        buttonLabel: "Open E tuning",
        menuLabel: "Open E tuning (EBEG#BE)",
        notes: ["E2", "B2", "E3", "G#3", "B3", "E4"],
      },
      {
        id: "open-g",
        buttonLabel: "Open G tuning",
        menuLabel: "Open G tuning (DGDGBD)",
        notes: ["D2", "G2", "D3", "G3", "B3", "D4"],
      },
      {
        id: "cgcfce",
        buttonLabel: "CGCFCE",
        menuLabel: "CGCFCE (Nick Drake) tuning",
        notes: ["C2", "G2", "C3", "F3", "C4", "E4"],
      },
      {
        id: "dgcgcd",
        buttonLabel: "DGCGCD",
        menuLabel: "DGCGCD (Rain Song) tuning",
        notes: ["D2", "G2", "C3", "G3", "C4", "D4"],
      },
      {
        id: "gabdeg",
        buttonLabel: "GABDEG",
        menuLabel: "GABDEG tuning",
        notes: ["G2", "A2", "B2", "D3", "E3", "G3"],
      },
    ];

    const microphoneButton = document.getElementById("microphoneButton");
    const tuningDropdown = document.getElementById("tuningDropdown");
    const tuningMenu = document.getElementById("tuningMenu");
    const tuningLabel = document.getElementById("tuningLabel");
    const stringsLayer = document.getElementById("stringsLayer");
    const frequencyValue = document.getElementById("frequencyValue");
    const referenceValue = document.getElementById("referenceValue");
    const noteValue = document.getElementById("noteValue");
    const liveStatus = document.getElementById("liveStatus");

    let currentTuningId = "standard";
    let selectedStringIndex = 0;
    let stringButtons = [];

    let audioContext = null;
    let analyser = null;
    let mediaStream = null;
    let source = null;
    let buffer = null;
    let animationFrameId = null;
    let isListening = false;
    let pitchHistory = [];
    let lastDetectedPitchAt = 0;
    let lastPitch = null;
    let indicatorState = "hidden";
    let isStringVibrating = false;

    function setStatus(message) {
      liveStatus.textContent = message;
    }

    function noteToFrequency(note) {
      const match = /^([A-G])(#?)(-?\d+)$/.exec(note);
      if (!match) return 0;
      const [, root, sharp, octaveText] = match;
      const semitone = NOTE_NAMES.indexOf(`${root}${sharp}`);
      const octave = Number(octaveText);
      const midi = (octave + 1) * 12 + semitone;
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function frequencyToMidi(freq) {
      return 69 + 12 * Math.log2(freq / 440);
    }

    function midiToNoteName(midi) {
      const rounded = Math.round(midi);
      const noteName = NOTE_NAMES[(rounded + 1200) % 12];
      const octave = Math.floor(rounded / 12) - 1;
      return `${noteName}${octave}`;
    }

    function centsOff(targetFreq, actualFreq) {
      return 1200 * Math.log2(actualFreq / targetFreq);
    }

    function median(values) {
      if (!values.length) return null;
      const sorted = [...values].sort((a, b) => a - b);
      const middle = Math.floor(sorted.length / 2);
      return sorted.length % 2 === 0
        ? (sorted[middle - 1] + sorted[middle]) / 2
        : sorted[middle];
    }

    function autoCorrelate(buf, sampleRate) {
      const size = buf.length;
      let rms = 0;

      for (let i = 0; i < size; i += 1) {
        const value = buf[i];
        rms += value * value;
      }

      rms = Math.sqrt(rms / size);
      if (rms < 0.015) return -1;

      let start = 0;
      let end = size - 1;
      const threshold = 0.2;

      for (let i = 0; i < size / 2; i += 1) {
        if (Math.abs(buf[i]) < threshold) {
          start = i;
          break;
        }
      }

      for (let i = 1; i < size / 2; i += 1) {
        if (Math.abs(buf[size - i]) < threshold) {
          end = size - i;
          break;
        }
      }

      const trimmed = buf.slice(start, end);
      const trimmedSize = trimmed.length;
      if (!trimmedSize) return -1;

      const correlations = new Array(trimmedSize).fill(0);
      for (let lag = 0; lag < trimmedSize; lag += 1) {
        let sum = 0;
        for (let i = 0; i < trimmedSize - lag; i += 1) {
          sum += trimmed[i] * trimmed[i + lag];
        }
        correlations[lag] = sum;
      }

      let dip = 0;
      while (dip + 1 < trimmedSize && correlations[dip] >= correlations[dip + 1]) {
        dip += 1;
      }

      let maxPosition = -1;
      let maxValue = -1;
      for (let i = dip; i < trimmedSize; i += 1) {
        if (correlations[i] > maxValue) {
          maxValue = correlations[i];
          maxPosition = i;
        }
      }

      if (maxPosition <= 0) return -1;

      const x1 = correlations[maxPosition - 1] || correlations[maxPosition];
      const x2 = correlations[maxPosition];
      const x3 = correlations[maxPosition + 1] || correlations[maxPosition];
      const a = (x1 + x3 - 2 * x2) / 2;
      const b = (x3 - x1) / 2;
      const shift = a ? -b / (2 * a) : 0;
      const period = maxPosition + shift;
      if (!period || !Number.isFinite(period)) return -1;

      const frequency = sampleRate / period;
      if (frequency < 55 || frequency > 450) return -1;
      return frequency;
    }

    function getCurrentTuning() {
      return TUNINGS.find((tuning) => tuning.id === currentTuningId) || TUNINGS[0];
    }

    function getCurrentStrings() {
      return getCurrentTuning().notes.map((note, index) => ({
        index,
        note,
        frequency: noteToFrequency(note),
      }));
    }

    function updateReferenceReadout() {
      const currentString = getCurrentStrings()[selectedStringIndex];
      if (!currentString) {
        referenceValue.textContent = "Välj en sträng";
        return;
      }
      referenceValue.textContent = `${currentString.note} ${currentString.frequency.toFixed(2)} Hz`;
    }

    function applyStringUI() {
      stringButtons.forEach((button, index) => {
        const isSelected = index === selectedStringIndex;
        button.classList.toggle("is-selected", isSelected);
        button.classList.toggle("is-vibrating", isSelected && isStringVibrating);
        button.classList.remove("show-indicator", "indicator-above", "indicator-below", "indicator-center");
        button.setAttribute("aria-pressed", String(isSelected));

        if (isSelected) {
          if (indicatorState === "hidden") {
            button.classList.add("show-indicator", "indicator-neutral");
          } else {
            button.classList.add("show-indicator", `indicator-${indicatorState}`);
          }
        }
      });
    }

    function renderStrings() {
      const currentStrings = getCurrentStrings();
      stringsLayer.innerHTML = currentStrings.map((stringData, index) => `
        <button
          class="string-column"
          type="button"
          data-string-index="${index}"
          aria-label="Välj sträng ${stringData.note}"
          aria-pressed="false"
        >
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">${stringData.note}</span>
          <span class="tuning-indicator" aria-hidden="true"></span>
        </button>
      `).join("");

      stringButtons = Array.from(stringsLayer.querySelectorAll(".string-column"));
      stringButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedStringIndex = Number(button.dataset.stringIndex);
          updateReferenceReadout();
          updateIndicatorForPitch(lastPitch);
          applyStringUI();
          const currentString = getCurrentStrings()[selectedStringIndex];
          if (currentString) {
            setStatus(`${currentString.note} vald.`);
          }
        });
      });

      applyStringUI();
    }

    function renderTuningMenu() {
      tuningMenu.innerHTML = TUNINGS.map((tuning) => `
        <button
          class="tuning-option"
          type="button"
          data-tuning-id="${tuning.id}"
          aria-current="${tuning.id === currentTuningId ? "true" : "false"}"
          role="option"
        >${tuning.menuLabel}</button>
      `).join("");

      tuningMenu.querySelectorAll(".tuning-option").forEach((button) => {
        button.addEventListener("click", () => {
          const nextTuningId = button.dataset.tuningId;
          const tuning = TUNINGS.find((item) => item.id === nextTuningId);
          if (!tuning) return;
          currentTuningId = tuning.id;
          tuningLabel.textContent = tuning.buttonLabel;
          renderTuningMenu();
          renderStrings();
          updateReferenceReadout();
          updateIndicatorForPitch(lastPitch);
          applyStringUI();
          tuningDropdown.removeAttribute("open");
          setStatus(`${tuning.buttonLabel} vald.`);
        });
      });
    }

    function updateIndicatorForPitch(pitch) {
      const currentString = getCurrentStrings()[selectedStringIndex];
      if (!currentString || !Number.isFinite(pitch)) {
        indicatorState = "hidden";
        isStringVibrating = false;
        return;
      }

      const cents = centsOff(currentString.frequency, pitch);
      if (Math.abs(cents) <= 5) {
        indicatorState = "center";
      } else if (cents < 0) {
        indicatorState = "below";
      } else {
        indicatorState = "above";
      }

      isStringVibrating = true;
    }

    function clearDetectedPitch() {
      frequencyValue.textContent = "0.0";
      noteValue.textContent = "—";
      lastPitch = null;
      pitchHistory = [];
      indicatorState = "hidden";
      isStringVibrating = false;
      applyStringUI();
    }

    function updateDetectedPitch(pitch) {
      lastPitch = pitch;
      frequencyValue.textContent = pitch.toFixed(1);
      noteValue.textContent = midiToNoteName(frequencyToMidi(pitch));
      updateIndicatorForPitch(pitch);
      applyStringUI();
      lastDetectedPitchAt = performance.now();
    }

    function detectPitch() {
      if (!analyser || !buffer || !audioContext || !isListening) return;
      analyser.getFloatTimeDomainData(buffer);
      const pitch = autoCorrelate(buffer, audioContext.sampleRate);

      if (pitch !== -1) {
        pitchHistory.push(pitch);
        if (pitchHistory.length > 5) {
          pitchHistory.shift();
        }
        const stablePitch = median(pitchHistory);
        if (stablePitch) {
          updateDetectedPitch(stablePitch);
          const currentString = getCurrentStrings()[selectedStringIndex];
          setStatus(currentString ? `Lyssnar på ${currentString.note}.` : "Lyssnar.");
        }
      } else if (performance.now() - lastDetectedPitchAt > 500) {
        clearDetectedPitch();
        setStatus("Ingen tydlig ton just nu.");
      }

      animationFrameId = requestAnimationFrame(detectPitch);
    }

    async function startListening() {
      if (isListening) return;

      microphoneButton.disabled = true;
      setStatus("Ber om mikrofonåtkomst...");

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
          },
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 4096;
        analyser.smoothingTimeConstant = 0.12;

        source = audioContext.createMediaStreamSource(mediaStream);
        source.connect(analyser);

        buffer = new Float32Array(analyser.fftSize);
        isListening = true;
        microphoneButton.textContent = "stop microphone";
        microphoneButton.disabled = false;
        lastDetectedPitchAt = 0;
        pitchHistory = [];
        clearDetectedPitch();
        detectPitch();
      } catch (error) {
        console.error(error);
        microphoneButton.disabled = false;
        setStatus("Kunde inte starta mikrofonen. Tillåt mikrofon i webbläsaren.");
      }
    }

    async function stopListening() {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }

      if (source) {
        try {
          source.disconnect();
        } catch (error) {
          console.error(error);
        }
      }

      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
      }

      if (audioContext) {
        try {
          await audioContext.close();
        } catch (error) {
          console.error(error);
        }
      }

      analyser = null;
      buffer = null;
      source = null;
      mediaStream = null;
      audioContext = null;
      isListening = false;
      microphoneButton.textContent = "Activate microphone";
      clearDetectedPitch();
      setStatus("Mikrofonen är stoppad.");
    }

    microphoneButton.addEventListener("click", async () => {
      if (isListening) {
        await stopListening();
      } else {
        await startListening();
      }
    });

    document.addEventListener("click", (event) => {
      if (!tuningDropdown.contains(event.target)) {
        tuningDropdown.removeAttribute("open");
      }
    });

    document.addEventListener("visibilitychange", async () => {
      if (!audioContext || !isListening) return;
      if (document.hidden) {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
      } else {
        if (audioContext.state === "suspended") {
          try {
            await audioContext.resume();
          } catch (error) {
            console.error(error);
          }
        }
        detectPitch();
      }
    });

    tuningLabel.textContent = getCurrentTuning().buttonLabel;
    renderTuningMenu();
    renderStrings();
    updateReferenceReadout();
    applyStringUI();
    setStatus("E2 vald. Aktivera mikrofonen för att börja lyssna.");
  </script>
</body>
</html>
