<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gitarrstämmare</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap");

    :root {
      --bg: #F5F5F2;
      --ink: #212325;
      --surface: #FFFFFF;
      --safe-top: max(env(safe-area-inset-top), 0px);
      --safe-bottom: max(env(safe-area-inset-bottom), 0px);
      --ring-size: 48px;
      --ring-gap: 8px;
      --strings-width: 328px;
      --line-width: 1px;
      --border-width: 1px;
      --dot-size: 18px;
      --dot-gap: 8px;
      --pill-height: 36px;
      --controls-side: 20px;
      --controls-top: 20px;
      --button-gap: 12px;
      --microphone-width: 151px;
      --tuning-width: 154px;
      --ring-center: 50svh;
      --readout-width: 124px;
      --readout-height: 82px;
      --readout-gap: 14px;
      --readout-bottom: 20px;
      --card-radius: 20px;
      --compact-controls-gap: 48px;
      --compact-readout-gap: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100svh;
      min-height: 100dvh;
    }

    button,
    summary {
      font: inherit;
    }

    .app {
      min-height: 100svh;
      min-height: 100dvh;
      background: var(--bg);
    }

    .stage {
      position: relative;
      width: 100%;
      min-height: 100svh;
      min-height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }

    .top-controls {
      position: absolute;
      top: calc(var(--safe-top) + var(--controls-top));
      left: var(--controls-side);
      right: var(--controls-side);
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--button-gap);
    }

    .pill,
    .tuning-dropdown > summary {
      height: var(--pill-height);
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: #FFFFFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.02em;
      white-space: nowrap;
      user-select: none;
      box-shadow: none;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .pill:active,
    .tuning-dropdown > summary:active,
    .tuning-option:active {
      transform: scale(0.985);
    }

    .microphone-button {
      width: var(--microphone-width);
      padding: 0 16px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .microphone-button[disabled] {
      opacity: 0.7;
      cursor: default;
    }

    .tuning-dropdown {
      position: relative;
      width: var(--tuning-width);
      flex: 0 0 auto;
    }

    .tuning-dropdown > summary {
      list-style: none;
      width: 100%;
      padding: 0 34px 0 16px;
      justify-content: flex-start;
      cursor: pointer;
      outline: none;
      position: relative;
    }

    .tuning-dropdown > summary::-webkit-details-marker {
      display: none;
    }

    .tuning-label {
      display: block;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
    }

    .tuning-caret {
      position: absolute;
      right: 14px;
      top: 50%;
      width: 10px;
      height: 6px;
      transform: translateY(-50%);
      transition: transform 160ms ease;
      pointer-events: none;
    }

    .tuning-caret::before,
    .tuning-caret::after {
      content: "";
      position: absolute;
      top: 1px;
      width: 7px;
      height: 1px;
      background: #FFFFFF;
    }

    .tuning-caret::before {
      left: -1px;
      transform: rotate(45deg);
      transform-origin: left center;
    }

    .tuning-caret::after {
      right: -1px;
      transform: rotate(-45deg);
      transform-origin: right center;
    }

    .tuning-dropdown[open] .tuning-caret {
      transform: translateY(-50%) rotate(180deg);
    }

    .tuning-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: min(272px, calc(100vw - (var(--controls-side) * 2)));
      max-height: min(56svh, 420px);
      overflow: auto;
      padding: 8px;
      border: var(--border-width) solid var(--ink);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 12px 28px rgba(33, 35, 37, 0.08);
    }

    .tuning-option {
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--ink);
      display: block;
      text-align: left;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      padding: 10px 12px;
      cursor: pointer;
    }

    .tuning-option[aria-current="true"] {
      background: rgba(33, 35, 37, 0.08);
    }

    .strings-layer {
      position: absolute;
      inset: 0;
      left: 50%;
      width: var(--strings-width);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(6, var(--ring-size));
      column-gap: var(--ring-gap);
      z-index: 2;
    }

    .string-button {
      position: relative;
      display: block;
      min-height: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .string-button:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }

    .string-visual {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: var(--line-width);
      transform: translateX(-50%);
      transform-origin: center center;
      will-change: transform;
      z-index: 0;
    }

    .string-button.is-vibrating .string-visual {
      animation: string-vibrate 120ms ease-in-out infinite;
    }

    .string-line {
      position: absolute;
      inset: 0;
      width: var(--line-width);
      background: var(--ink);
    }

    .ring {
      position: absolute;
      left: 50%;
      top: var(--ring-center);
      width: var(--ring-size);
      height: var(--ring-size);
      transform: translate(-50%, -50%);
      border: var(--border-width) solid var(--ink);
      border-radius: 50%;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      z-index: 2;
      transition: background 120ms ease, color 120ms ease;
    }

    .string-button.is-selected .ring {
      background: var(--ink);
      color: #FFFFFF;
    }

    .tuning-dot {
      position: absolute;
      left: 50%;
      width: var(--dot-size);
      height: var(--dot-size);
      top: calc(var(--ring-center) + (var(--ring-size) * 0.5) + var(--dot-gap));
      transform: translateX(-50%);
      border: var(--border-width) solid var(--ink);
      border-radius: 50%;
      background: var(--bg);
      opacity: 0;
      z-index: 1;
      transition: top 160ms ease, background 160ms ease, transform 160ms ease, opacity 160ms ease;
    }

    .string-button.is-selected .tuning-dot {
      opacity: 1;
    }

    .string-button.dot-below .tuning-dot {
      top: calc(var(--ring-center) + (var(--ring-size) * 0.5) + var(--dot-gap));
    }

    .string-button.dot-center .tuning-dot {
      top: calc(var(--ring-center) + (var(--ring-size) * 0.5) + 4px);
      background: var(--ink);
      transform: translateX(-50%) scale(0.78);
    }

    .string-button.dot-above .tuning-dot {
      top: calc(var(--ring-center) - (var(--ring-size) * 0.5) - var(--dot-size) - var(--dot-gap));
    }

    .readout-stack {
      position: absolute;
      left: 50%;
      bottom: calc(var(--safe-bottom) + var(--readout-bottom));
      transform: translateX(-50%);
      display: grid;
      gap: var(--readout-gap);
      justify-items: center;
      width: var(--readout-width);
      z-index: 10;
      pointer-events: none;
    }

    .readout-card {
      width: 100%;
      min-height: var(--readout-height);
      background: var(--surface);
      border-radius: var(--card-radius);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 10px;
      padding: 12px 10px;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(33, 35, 37, 0.02);
    }

    .readout-card.secondary {
      gap: 8px;
    }

    .readout-primary {
      font-size: 24px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    .readout-secondary {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes string-vibrate {
      0% {
        transform: translateX(-50%);
      }
      20% {
        transform: translateX(calc(-50% - 1px));
      }
      50% {
        transform: translateX(calc(-50% + 2.5px));
      }
      80% {
        transform: translateX(calc(-50% - 0.75px));
      }
      100% {
        transform: translateX(-50%);
      }
    }

    @media (max-width: 374px) {
      :root {
        --controls-side: 12px;
        --button-gap: 10px;
      }

      .microphone-button,
      .tuning-dropdown {
        width: calc((100vw - (var(--controls-side) * 2) - var(--button-gap)) / 2);
      }
    }

    @media (orientation: landscape) and (max-height: 560px) {
      :root {
        --controls-top: 20px;
        --readout-bottom: 20px;
        --readout-gap: var(--compact-readout-gap);
      }

      .top-controls {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: max-content;
        justify-content: center;
        gap: var(--compact-controls-gap);
      }

      .readout-stack {
        width: auto;
        grid-auto-flow: column;
        grid-auto-columns: var(--readout-width);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0ms !important;
        transition-duration: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="Gitarrstämmare">
      <section class="top-controls" aria-label="Kontroller">
        <button id="microphoneButton" class="pill microphone-button" type="button">Activate microphone</button>

        <details id="tuningDropdown" class="tuning-dropdown">
          <summary class="pill" aria-label="Välj tuning">
            <span id="tuningLabel" class="tuning-label">Standard tuning</span>
            <span class="tuning-caret" aria-hidden="true"></span>
          </summary>
          <div id="tuningMenu" class="tuning-menu" role="listbox" aria-label="Tillgängliga tunings"></div>
        </details>
      </section>

      <section id="stringsLayer" class="strings-layer" aria-label="Gitarrens sex strängar"></section>

      <section class="readout-stack" aria-live="polite">
        <article class="readout-card primary">
          <div id="frequencyValue" class="readout-primary">0.0</div>
          <div id="referenceValue" class="readout-secondary">E2 82.41 Hz</div>
        </article>
        <article class="readout-card secondary">
          <div class="readout-secondary">Ton nu</div>
          <div id="noteValue" class="readout-primary">—</div>
        </article>
      </section>

      <p id="liveStatus" class="sr-only" aria-live="polite">Välj en sträng och aktivera mikrofonen.</p>
    </section>
  </main>

  <script>
    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const SEMITONES = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };

    const TUNINGS = [
      {
        id: "standard",
        buttonLabel: "Standard tuning",
        menuLabel: "Standard tuning (EADGBE)",
        notes: ["E2", "A2", "D3", "G3", "B3", "E4"],
      },
      {
        id: "drop-d",
        buttonLabel: "Drop D tuning",
        menuLabel: "Drop D tuning (DADGBE)",
        notes: ["D2", "A2", "D3", "G3", "B3", "E4"],
      },
      {
        id: "drop-c",
        buttonLabel: "Drop C tuning",
        menuLabel: "Drop C tuning (CGCFAD)",
        notes: ["C2", "G2", "C3", "F3", "A3", "D4"],
      },
      {
        id: "double-drop-d",
        buttonLabel: "Double Drop D tuning",
        menuLabel: "Double Drop D tuning (DADGBD)",
        notes: ["D2", "A2", "D3", "G3", "B3", "D4"],
      },
      {
        id: "dadgad",
        buttonLabel: "DADGAD",
        menuLabel: "DADGAD (Celtic) tuning",
        notes: ["D2", "A2", "D3", "G3", "A3", "D4"],
      },
      {
        id: "nashville",
        buttonLabel: "Nashville tuning",
        menuLabel: "Nashville tuning (E’A’D’G’BE)",
        notes: ["E3", "A3", "D4", "G4", "B3", "E4"],
      },
      {
        id: "open-e",
        buttonLabel: "Open E tuning",
        menuLabel: "Open E tuning (EBEG#BE)",
        notes: ["E2", "B2", "E3", "G#3", "B3", "E4"],
      },
      {
        id: "open-g",
        buttonLabel: "Open G tuning",
        menuLabel: "Open G tuning (DGDGBD)",
        notes: ["D2", "G2", "D3", "G3", "B3", "D4"],
      },
      {
        id: "cgcfce",
        buttonLabel: "CGCFCE",
        menuLabel: "CGCFCE (Nick Drake) tuning",
        notes: ["C2", "G2", "C3", "F3", "C4", "E4"],
      },
      {
        id: "dgcgcd",
        buttonLabel: "DGCGCD",
        menuLabel: "DGCGCD (Rain Song) tuning",
        notes: ["D2", "G2", "C3", "G3", "C4", "D4"],
      },
      {
        id: "gabdeg",
        buttonLabel: "GABDEG",
        menuLabel: "GABDEG tuning",
        notes: ["G2", "A2", "B2", "D3", "E3", "G3"],
      },
    ];

    const microphoneButton = document.getElementById("microphoneButton");
    const tuningDropdown = document.getElementById("tuningDropdown");
    const tuningMenu = document.getElementById("tuningMenu");
    const tuningLabel = document.getElementById("tuningLabel");
    const stringsLayer = document.getElementById("stringsLayer");
    const frequencyValue = document.getElementById("frequencyValue");
    const referenceValue = document.getElementById("referenceValue");
    const noteValue = document.getElementById("noteValue");
    const liveStatus = document.getElementById("liveStatus");

    let currentTuning = TUNINGS[0];
    let selectedIndex = 0;
    let stringButtons = [];
    let audioContext = null;
    let analyser = null;
    let mediaStream = null;
    let sourceNode = null;
    let sampleBuffer = null;
    let rafId = 0;
    let isListening = false;
    let lastDetectedAt = 0;
    let lastDetectedNote = "—";

    function setStatus(message) {
      liveStatus.textContent = message;
    }

    function noteToMidi(note) {
      const match = /^([A-G])(#?)(-?\d+)$/.exec(note);
      if (!match) return null;
      const [, letter, sharp, octaveText] = match;
      const octave = Number(octaveText);
      const semitone = SEMITONES[letter] + (sharp ? 1 : 0);
      return ((octave + 1) * 12) + semitone;
    }

    function midiToNoteName(midi) {
      const rounded = Math.round(midi);
      const noteName = NOTE_NAMES[(rounded % 12 + 12) % 12];
      const octave = Math.floor(rounded / 12) - 1;
      return `${noteName}${octave}`;
    }

    function noteToFrequency(note) {
      const midi = noteToMidi(note);
      if (!Number.isFinite(midi)) return NaN;
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function frequencyToMidi(freq) {
      return 69 + (12 * Math.log2(freq / 440));
    }

    function centsOff(targetFreq, actualFreq) {
      return 1200 * Math.log2(actualFreq / targetFreq);
    }

    function formatFrequency(freq) {
      return `${freq.toFixed(2)} Hz`;
    }

    function getSelectedString() {
      const note = currentTuning.notes[selectedIndex];
      return {
        index: selectedIndex,
        note,
        midi: noteToMidi(note),
        freq: noteToFrequency(note),
      };
    }

    function buildStrings() {
      stringsLayer.innerHTML = "";
      stringButtons = currentTuning.notes.map((note, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "string-button";
        button.dataset.index = String(index);
        button.setAttribute("aria-pressed", index === selectedIndex ? "true" : "false");
        button.setAttribute("aria-label", `Välj sträng ${note}`);

        const visual = document.createElement("span");
        visual.className = "string-visual";

        const line = document.createElement("span");
        line.className = "string-line";

        const dot = document.createElement("span");
        dot.className = "tuning-dot";
        dot.setAttribute("aria-hidden", "true");

        visual.append(line, dot);

        const ring = document.createElement("span");
        ring.className = "ring";
        ring.textContent = note;
        ring.setAttribute("aria-hidden", "true");

        button.append(visual, ring);
        button.addEventListener("click", () => {
          updateSelectedString(index);
        });

        stringsLayer.appendChild(button);
        return button;
      });

      applySelectionState();
      updateReferenceReadout();
      updateSelectedStringFeedback(NaN);
    }

    function applySelectionState() {
      stringButtons.forEach((button, index) => {
        const isSelected = index === selectedIndex;
        button.classList.toggle("is-selected", isSelected);
        button.classList.toggle("dot-below", isSelected);
        button.classList.remove("dot-above", "dot-center", "is-vibrating");
        button.setAttribute("aria-pressed", isSelected ? "true" : "false");
      });
    }

    function updateSelectedString(index) {
      selectedIndex = index;
      applySelectionState();
      updateReferenceReadout();
      updateSelectedStringFeedback(NaN);
      if (!isListening) {
        frequencyValue.textContent = "0.0";
        noteValue.textContent = "—";
        lastDetectedNote = "—";
      }
      setStatus(`Vald sträng ${currentTuning.notes[selectedIndex]}.`);
    }

    function updateReferenceReadout() {
      const selected = getSelectedString();
      referenceValue.textContent = `${selected.note} ${formatFrequency(selected.freq)}`;
    }

    function renderTuningMenu() {
      tuningMenu.innerHTML = "";
      TUNINGS.forEach((tuning) => {
        const option = document.createElement("button");
        option.type = "button";
        option.className = "tuning-option";
        option.textContent = tuning.menuLabel;
        option.setAttribute("role", "option");
        option.setAttribute("aria-current", tuning.id === currentTuning.id ? "true" : "false");
        option.addEventListener("click", () => {
          currentTuning = tuning;
          tuningLabel.textContent = tuning.buttonLabel;
          renderTuningMenu();
          buildStrings();
          resetReadout(false);
          tuningDropdown.open = false;
          setStatus(`Vald tuning ${tuning.buttonLabel}.`);
        });
        tuningMenu.appendChild(option);
      });
    }

    function updateSelectedStringFeedback(pitch) {
      stringButtons.forEach((button, index) => {
        const isSelected = index === selectedIndex;
        button.classList.toggle("is-selected", isSelected);
        button.classList.remove("dot-above", "dot-center", "dot-below", "is-vibrating");
        if (isSelected) {
          button.classList.add("dot-below");
        }
      });

      const selectedButton = stringButtons[selectedIndex];
      const selected = getSelectedString();
      if (!selectedButton || !Number.isFinite(pitch)) return;

      const midiDistance = Math.abs(frequencyToMidi(pitch) - selected.midi);
      if (midiDistance > 2.5) {
        return;
      }

      const cents = centsOff(selected.freq, pitch);
      selectedButton.classList.toggle("is-vibrating", true);
      selectedButton.classList.remove("dot-above", "dot-center", "dot-below");

      if (Math.abs(cents) <= 4) {
        selectedButton.classList.add("dot-center");
      } else if (cents > 0) {
        selectedButton.classList.add("dot-above");
      } else {
        selectedButton.classList.add("dot-below");
      }
    }

    function resetReadout(clearNote = true) {
      frequencyValue.textContent = "0.0";
      if (clearNote) {
        noteValue.textContent = "—";
        lastDetectedNote = "—";
      } else {
        noteValue.textContent = lastDetectedNote;
      }
      updateReferenceReadout();
      updateSelectedStringFeedback(NaN);
    }

    function stopDetectLoop() {
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = 0;
      }
    }

    async function stopListening() {
      stopDetectLoop();
      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
      }
      if (sourceNode) {
        sourceNode.disconnect();
      }
      if (audioContext) {
        try {
          await audioContext.close();
        } catch (error) {
          console.error(error);
        }
      }
      audioContext = null;
      analyser = null;
      mediaStream = null;
      sourceNode = null;
      sampleBuffer = null;
      isListening = false;
      lastDetectedAt = 0;
      microphoneButton.textContent = "Activate microphone";
      resetReadout(true);
      setStatus("Mikrofonen är avstängd.");
    }

    function autoCorrelate(buffer, sampleRate) {
      const size = buffer.length;
      let rms = 0;

      for (let i = 0; i < size; i += 1) {
        rms += buffer[i] * buffer[i];
      }
      rms = Math.sqrt(rms / size);
      if (rms < 0.015) return -1;

      let r1 = 0;
      let r2 = size - 1;
      const threshold = 0.2;

      for (let i = 0; i < size / 2; i += 1) {
        if (Math.abs(buffer[i]) < threshold) {
          r1 = i;
          break;
        }
      }

      for (let i = 1; i < size / 2; i += 1) {
        if (Math.abs(buffer[size - i]) < threshold) {
          r2 = size - i;
          break;
        }
      }

      const trimmed = buffer.slice(r1, r2);
      const newSize = trimmed.length;
      const correlations = new Array(newSize).fill(0);

      for (let lag = 0; lag < newSize; lag += 1) {
        let sum = 0;
        for (let i = 0; i < newSize - lag; i += 1) {
          sum += trimmed[i] * trimmed[i + lag];
        }
        correlations[lag] = sum;
      }

      let dip = 0;
      while (dip + 1 < newSize && correlations[dip] >= correlations[dip + 1]) {
        dip += 1;
      }

      let maxPosition = -1;
      let maxValue = -1;
      for (let i = dip; i < newSize; i += 1) {
        if (correlations[i] > maxValue) {
          maxValue = correlations[i];
          maxPosition = i;
        }
      }

      if (maxPosition <= 0) return -1;

      const x1 = correlations[maxPosition - 1] || correlations[maxPosition];
      const x2 = correlations[maxPosition];
      const x3 = correlations[maxPosition + 1] || correlations[maxPosition];
      const a = (x1 + x3 - (2 * x2)) / 2;
      const b = (x3 - x1) / 2;
      const shift = a ? (-b / (2 * a)) : 0;
      const period = maxPosition + shift;

      if (!period || !Number.isFinite(period)) return -1;

      const frequency = sampleRate / period;
      if (frequency < 55 || frequency > 450) return -1;
      return frequency;
    }

    function updateReadout(pitch) {
      const midi = frequencyToMidi(pitch);
      const noteName = midiToNoteName(midi);
      lastDetectedNote = noteName;
      frequencyValue.textContent = pitch.toFixed(1);
      noteValue.textContent = noteName;
      updateSelectedStringFeedback(pitch);
      lastDetectedAt = performance.now();
      setStatus("Lyssnar efter ton.");
    }

    function detectPitch() {
      if (!analyser || !sampleBuffer || !audioContext || !isListening) return;

      analyser.getFloatTimeDomainData(sampleBuffer);
      const pitch = autoCorrelate(sampleBuffer, audioContext.sampleRate);

      if (pitch !== -1) {
        updateReadout(pitch);
      } else if (performance.now() - lastDetectedAt > 450) {
        frequencyValue.textContent = "0.0";
        noteValue.textContent = lastDetectedNote;
        updateSelectedStringFeedback(NaN);
      }

      rafId = requestAnimationFrame(detectPitch);
    }

    async function startListening() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("Din webbläsare stödjer inte mikrofonåtkomst.");
        return;
      }

      microphoneButton.disabled = true;

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
          },
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 4096;
        analyser.smoothingTimeConstant = 0.15;
        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        sourceNode.connect(analyser);
        sampleBuffer = new Float32Array(analyser.fftSize);
        isListening = true;
        lastDetectedAt = 0;
        microphoneButton.textContent = "stop microphone";
        setStatus("Mikrofonen är på.");
        detectPitch();
      } catch (error) {
        console.error(error);
        await stopListening();
        setStatus("Kunde inte starta mikrofonen. Kontrollera tillstånd i webbläsaren.");
      } finally {
        microphoneButton.disabled = false;
      }
    }

    microphoneButton.addEventListener("click", async () => {
      if (isListening) {
        await stopListening();
      } else {
        await startListening();
      }
    });

    document.addEventListener("click", (event) => {
      if (!tuningDropdown.contains(event.target)) {
        tuningDropdown.open = false;
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        tuningDropdown.open = false;
      }
    });

    document.addEventListener("visibilitychange", async () => {
      if (!audioContext || !isListening) return;
      if (document.hidden) {
        stopDetectLoop();
      } else {
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }
        detectPitch();
      }
    });

    tuningLabel.textContent = currentTuning.buttonLabel;
    renderTuningMenu();
    buildStrings();
    updateSelectedString(0);
    resetReadout(true);
  </script>
</body>
</html>
