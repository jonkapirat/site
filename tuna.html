<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Guitar tuner</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap");

    :root {
      --bg: #F5F5F2;
      --ink: #212325;
      --surface: #FFFFFF;
      --stage-width: 380px;
      --strings-width: 328px;
      --ring-size: 48px;
      --ring-gap: 8px;
      --line-width: 1px;
      --border-width: 1px;
      --dot-size: 18px;
      --pill-height: 36px;
      --controls-top-offset: clamp(12px, 2.7svh, 20px);
      --controls-inline: 20px;
      --ring-center-y: clamp(272px, 50.3svh, 379px);
      --readout-bottom: clamp(12px, 2.8svh, 21px);
      --readout-width: 124px;
      --readout-height: 81px;
      --readout-gap: clamp(8px, 1.2svh, 12px);
      --safe-top: max(env(safe-area-inset-top), 0px);
      --safe-bottom: max(env(safe-area-inset-bottom), 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100svh;
    }

    button,
    summary {
      font: inherit;
    }

    .app {
      min-height: 100svh;
      background: var(--bg);
    }

    .stage {
      position: relative;
      width: min(100vw, var(--stage-width));
      min-height: 100svh;
      margin: 0 auto;
      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }

    .top-controls {
      position: absolute;
      top: calc(var(--safe-top) + var(--controls-top-offset));
      left: var(--controls-inline);
      right: var(--controls-inline);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .pill,
    .tuning-dropdown > summary {
      height: var(--pill-height);
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: #FFFFFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.02em;
      user-select: none;
      box-shadow: none;
      transition: transform 120ms ease;
    }

    .pill:active,
    .tuning-dropdown > summary:active,
    .tuning-option:active {
      transform: scale(0.985);
    }

    .microphone-button {
      width: 151px;
      padding: 0 16px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .microphone-button[disabled] {
      opacity: 0.72;
      cursor: default;
    }

    .tuning-dropdown {
      position: relative;
      flex: 0 0 auto;
      width: 154px;
    }

    .tuning-dropdown > summary {
      list-style: none;
      width: 100%;
      padding: 0 34px 0 16px;
      justify-content: flex-start;
      cursor: pointer;
      outline: none;
      position: relative;
    }

    .tuning-dropdown > summary::-webkit-details-marker {
      display: none;
    }

    .tuning-label {
      display: block;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
    }

    .tuning-caret {
      position: absolute;
      right: 14px;
      top: 50%;
      width: 10px;
      height: 6px;
      transform: translateY(-50%);
      transition: transform 160ms ease;
      pointer-events: none;
    }

    .tuning-caret::before,
    .tuning-caret::after {
      content: "";
      position: absolute;
      top: 1px;
      width: 7px;
      height: 1px;
      background: #FFFFFF;
    }

    .tuning-caret::before {
      left: -1px;
      transform: rotate(45deg);
      transform-origin: left center;
    }

    .tuning-caret::after {
      right: -1px;
      transform: rotate(-45deg);
      transform-origin: right center;
    }

    .tuning-dropdown[open] .tuning-caret {
      transform: translateY(-50%) rotate(180deg);
    }

    .tuning-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: min(272px, calc(100vw - (var(--controls-inline) * 2)));
      max-height: min(56svh, 420px);
      overflow: auto;
      padding: 8px;
      border: var(--border-width) solid var(--ink);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 10px 24px rgba(33, 35, 37, 0.08);
    }

    .tuning-option {
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--ink);
      display: block;
      text-align: left;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      padding: 10px 12px;
      cursor: pointer;
    }

    .tuning-option[aria-current="true"] {
      background: rgba(33, 35, 37, 0.08);
    }

    .strings-layer {
      position: absolute;
      inset: 0;
      left: 50%;
      width: var(--strings-width);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(6, var(--ring-size));
      column-gap: var(--ring-gap);
      z-index: 1;
    }

    .string-column {
      position: relative;
      display: block;
      width: 100%;
      min-height: 100svh;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .string-column:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }

    .string-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: var(--line-width);
      background: var(--ink);
      transform: translateX(-50%);
      transform-origin: center center;
      will-change: transform;
      z-index: 0;
    }

    .string-column.is-vibrating .string-line {
      animation: string-vibrate 128ms linear infinite;
    }

    .ring {
      position: absolute;
      left: 50%;
      top: var(--ring-center-y);
      width: var(--ring-size);
      height: var(--ring-size);
      transform: translate(-50%, -50%);
      border: var(--border-width) solid var(--ink);
      border-radius: 50%;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.02em;
      z-index: 2;
      transition: background 180ms ease, color 180ms ease;
    }

    .string-column.is-selected .ring {
      background: var(--ink);
      color: #FFFFFF;
    }

    .tuning-dot {
      position: absolute;
      left: 50%;
      width: var(--dot-size);
      height: var(--dot-size);
      border: var(--border-width) solid var(--ink);
      border-radius: 50%;
      background: var(--bg);
      opacity: 0;
      z-index: 2;
      transform: translateX(-50%);
      top: calc(var(--ring-center-y) + (var(--ring-size) * 0.5) + 12px);
      transition: top 160ms ease, opacity 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .string-column.is-selected .tuning-dot {
      opacity: 1;
    }

    .string-column.dot-below .tuning-dot {
      top: calc(var(--ring-center-y) + (var(--ring-size) * 0.5) + 12px);
    }

    .string-column.dot-center .tuning-dot {
      top: calc(var(--ring-center-y) + (var(--ring-size) * 0.5) + 4px);
      background: var(--ink);
      transform: translateX(-50%) scale(0.86);
    }

    .string-column.dot-above .tuning-dot {
      top: calc(var(--ring-center-y) - (var(--ring-size) * 0.5) - var(--dot-size) - 10px);
    }

    .readout-stack {
      position: absolute;
      left: 50%;
      bottom: calc(var(--safe-bottom) + var(--readout-bottom));
      transform: translateX(-50%);
      z-index: 10;
      width: var(--readout-width);
      display: grid;
      gap: var(--readout-gap);
      pointer-events: none;
    }

    .readout-card {
      width: 100%;
      height: var(--readout-height);
      border-radius: 24px;
      background: var(--surface);
      display: grid;
      align-content: center;
      justify-items: center;
      padding: 12px 10px;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(33, 35, 37, 0.02);
    }

    .primary-value,
    .secondary-value {
      font-size: 24px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .reference-line,
    .card-label {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes string-vibrate {
      0% { transform: translateX(-50%); }
      20% { transform: translateX(calc(-50% - 1.1px)); }
      40% { transform: translateX(calc(-50% + 1.6px)); }
      60% { transform: translateX(calc(-50% - 0.8px)); }
      80% { transform: translateX(calc(-50% + 1.1px)); }
      100% { transform: translateX(-50%); }
    }

    @media (max-height: 760px) {
      :root {
        --controls-top-offset: clamp(10px, 2svh, 16px);
        --ring-center-y: clamp(248px, 48.5svh, 348px);
        --readout-bottom: clamp(10px, 2svh, 16px);
      }
    }

    @media (max-height: 680px) {
      :root {
        --ring-center-y: clamp(228px, 46svh, 316px);
        --readout-bottom: 10px;
        --readout-gap: 8px;
      }
    }

    @media (max-width: 359px) {
      :root {
        --controls-inline: 12px;
      }

      .top-controls {
        gap: 10px;
      }

      .microphone-button,
      .tuning-dropdown {
        width: calc((100vw - (var(--controls-inline) * 2) - 10px) / 2);
      }

      .pill,
      .tuning-dropdown > summary {
        font-size: 13px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0ms !important;
        transition-duration: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="Gitarrstämmare">
      <div class="top-controls">
        <button id="microphoneButton" class="pill microphone-button" type="button">Activate microphone</button>

        <details id="tuningDropdown" class="tuning-dropdown">
          <summary class="pill" aria-label="Välj tuning">
            <span id="tuningLabel" class="tuning-label">Standard tuning</span>
            <span class="tuning-caret" aria-hidden="true"></span>
          </summary>
          <div id="tuningMenu" class="tuning-menu" role="listbox" aria-label="Tuningalternativ"></div>
        </details>
      </div>

      <section id="stringsLayer" class="strings-layer" aria-label="Sex gitarrsträngar">
        <button class="string-column" type="button" data-index="0" aria-pressed="true" aria-label="Välj sträng E2">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">E2</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
        <button class="string-column" type="button" data-index="1" aria-pressed="false" aria-label="Välj sträng A2">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">A2</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
        <button class="string-column" type="button" data-index="2" aria-pressed="false" aria-label="Välj sträng D3">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">D3</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
        <button class="string-column" type="button" data-index="3" aria-pressed="false" aria-label="Välj sträng G3">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">G3</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
        <button class="string-column" type="button" data-index="4" aria-pressed="false" aria-label="Välj sträng B3">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">B3</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
        <button class="string-column" type="button" data-index="5" aria-pressed="false" aria-label="Välj sträng E4">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">E4</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
      </section>

      <section class="readout-stack" aria-live="polite">
        <article class="readout-card">
          <div id="frequencyValue" class="primary-value">0.0</div>
          <div id="referenceValue" class="reference-line">E2 82.41 Hz</div>
        </article>
        <article class="readout-card">
          <div class="card-label">Ton nu</div>
          <div id="noteValue" class="secondary-value">—</div>
        </article>
      </section>

      <p id="liveStatus" class="sr-only" aria-live="polite">Välj en sträng och aktivera mikrofonen.</p>
    </section>
  </main>

  <script>
    const TUNINGS = [
      {
        id: 'standard',
        label: 'Standard tuning',
        menuLabel: 'Standard tuning (EADGBE)',
        notes: ['E2', 'A2', 'D3', 'G3', 'B3', 'E4'],
      },
      {
        id: 'drop-d',
        label: 'Drop D tuning',
        menuLabel: 'Drop D tuning (DADGBE)',
        notes: ['D2', 'A2', 'D3', 'G3', 'B3', 'E4'],
      },
      {
        id: 'drop-c',
        label: 'Drop C tuning',
        menuLabel: 'Drop C tuning (CGCFAD)',
        notes: ['C2', 'G2', 'C3', 'F3', 'A3', 'D4'],
      },
      {
        id: 'double-drop-d',
        label: 'Double Drop D tuning',
        menuLabel: 'Double Drop D tuning (DADGBD)',
        notes: ['D2', 'A2', 'D3', 'G3', 'B3', 'D4'],
      },
      {
        id: 'dadgad',
        label: 'DADGAD (Celtic) tuning',
        menuLabel: 'DADGAD (Celtic) tuning',
        notes: ['D2', 'A2', 'D3', 'G3', 'A3', 'D4'],
      },
      {
        id: 'nashville',
        label: 'Nashville tuning',
        menuLabel: 'Nashville tuning (E’A’D’G’BE)',
        notes: ['E3', 'A3', 'D4', 'G4', 'B3', 'E4'],
      },
      {
        id: 'open-e',
        label: 'Open E tuning',
        menuLabel: 'Open E tuning (EBEG#BE)',
        notes: ['E2', 'B2', 'E3', 'G#3', 'B3', 'E4'],
      },
      {
        id: 'open-g',
        label: 'Open G tuning',
        menuLabel: 'Open G tuning (DGDGBD)',
        notes: ['D2', 'G2', 'D3', 'G3', 'B3', 'D4'],
      },
      {
        id: 'cgcfce',
        label: 'CGCFCE (Nick Drake) tuning',
        menuLabel: 'CGCFCE (Nick Drake) tuning',
        notes: ['C2', 'G2', 'C3', 'F3', 'C4', 'E4'],
      },
      {
        id: 'dgcgcd',
        label: 'DGCGCD (Rain Song) tuning',
        menuLabel: 'DGCGCD (Rain Song) tuning',
        notes: ['D2', 'G2', 'C3', 'G3', 'C4', 'D4'],
      },
      {
        id: 'gabdeg',
        label: 'GABDEG tuning',
        menuLabel: 'GABDEG tuning',
        notes: ['G2', 'A2', 'B2', 'D3', 'E3', 'G3'],
      },
    ];

    const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const NOTE_TO_SEMITONE = {
      C: 0,
      'C#': 1,
      D: 2,
      'D#': 3,
      E: 4,
      F: 5,
      'F#': 6,
      G: 7,
      'G#': 8,
      A: 9,
      'A#': 10,
      B: 11,
    };

    const microphoneButton = document.getElementById('microphoneButton');
    const tuningDropdown = document.getElementById('tuningDropdown');
    const tuningLabel = document.getElementById('tuningLabel');
    const tuningMenu = document.getElementById('tuningMenu');
    const frequencyValue = document.getElementById('frequencyValue');
    const referenceValue = document.getElementById('referenceValue');
    const noteValue = document.getElementById('noteValue');
    const liveStatus = document.getElementById('liveStatus');
    const stringButtons = Array.from(document.querySelectorAll('.string-column'));

    let currentTuning = TUNINGS[0];
    let selectedStringIndex = 0;
    let audioContext = null;
    let analyser = null;
    let mediaStream = null;
    let sourceNode = null;
    let sampleBuffer = null;
    let animationFrameId = 0;
    let isListening = false;
    let pitchHistory = [];
    let lastDetectedPitchAt = 0;
    let lastDisplayedNote = '—';
    let indicatorState = 'below';
    let shouldVibrate = false;

    function setStatus(message) {
      liveStatus.textContent = message;
    }

    function noteToMidi(note) {
      const match = /^([A-G])(#?)(-?\d+)$/.exec(note);
      if (!match) return null;
      const [, letter, sharp, octaveText] = match;
      const pitchClass = `${letter}${sharp}`;
      const octave = Number(octaveText);
      return (octave + 1) * 12 + NOTE_TO_SEMITONE[pitchClass];
    }

    function noteToFrequency(note) {
      const midi = noteToMidi(note);
      if (midi === null) return null;
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function frequencyToMidi(freq) {
      return 69 + (12 * Math.log2(freq / 440));
    }

    function midiToNoteName(midi) {
      const rounded = Math.round(midi);
      const name = NOTE_NAMES[((rounded % 12) + 12) % 12];
      const octave = Math.floor(rounded / 12) - 1;
      return `${name}${octave}`;
    }

    function centsOff(targetFreq, actualFreq) {
      return 1200 * Math.log2(actualFreq / targetFreq);
    }

    function getSelectedNote() {
      return currentTuning.notes[selectedStringIndex];
    }

    function getSelectedFrequency() {
      return noteToFrequency(getSelectedNote());
    }

    function formatReference() {
      const note = getSelectedNote();
      const freq = getSelectedFrequency();
      return `${note} ${freq.toFixed(2)} Hz`;
    }

    function median(values) {
      if (!values.length) return null;
      const sorted = [...values].sort((a, b) => a - b);
      const middle = Math.floor(sorted.length / 2);
      return sorted.length % 2 === 0
        ? (sorted[middle - 1] + sorted[middle]) / 2
        : sorted[middle];
    }

    function autoCorrelate(buffer, sampleRate) {
      const size = buffer.length;
      let rms = 0;

      for (let i = 0; i < size; i += 1) {
        const value = buffer[i];
        rms += value * value;
      }

      rms = Math.sqrt(rms / size);
      if (rms < 0.015) return -1;

      let r1 = 0;
      let r2 = size - 1;
      const threshold = 0.2;

      for (let i = 0; i < size / 2; i += 1) {
        if (Math.abs(buffer[i]) < threshold) {
          r1 = i;
          break;
        }
      }

      for (let i = 1; i < size / 2; i += 1) {
        if (Math.abs(buffer[size - i]) < threshold) {
          r2 = size - i;
          break;
        }
      }

      const trimmed = buffer.slice(r1, r2);
      const trimmedSize = trimmed.length;
      const correlations = new Array(trimmedSize).fill(0);

      for (let lag = 0; lag < trimmedSize; lag += 1) {
        let sum = 0;
        for (let i = 0; i < trimmedSize - lag; i += 1) {
          sum += trimmed[i] * trimmed[i + lag];
        }
        correlations[lag] = sum;
      }

      let dip = 0;
      while (dip + 1 < trimmedSize && correlations[dip] >= correlations[dip + 1]) {
        dip += 1;
      }

      let maxPos = -1;
      let maxVal = -1;
      for (let i = dip; i < trimmedSize; i += 1) {
        if (correlations[i] > maxVal) {
          maxVal = correlations[i];
          maxPos = i;
        }
      }

      if (maxPos <= 0) return -1;

      const x1 = correlations[maxPos - 1] || correlations[maxPos];
      const x2 = correlations[maxPos];
      const x3 = correlations[maxPos + 1] || correlations[maxPos];
      const a = (x1 + x3 - (2 * x2)) / 2;
      const b = (x3 - x1) / 2;
      const shift = a ? -b / (2 * a) : 0;
      const period = maxPos + shift;

      if (!period || !Number.isFinite(period)) return -1;

      const frequency = sampleRate / period;
      if (frequency < 60 || frequency > 700) return -1;
      return frequency;
    }

    function getNearestStringIndex(pitch) {
      let bestIndex = 0;
      let bestDistance = Infinity;
      const midi = frequencyToMidi(pitch);

      currentTuning.notes.forEach((note, index) => {
        const noteMidi = noteToMidi(note);
        const distance = Math.abs(midi - noteMidi);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestIndex = index;
        }
      });

      return bestIndex;
    }

    function applyStringUI() {
      stringButtons.forEach((button, index) => {
        const isSelected = index === selectedStringIndex;
        button.classList.toggle('is-selected', isSelected);
        button.classList.toggle('is-vibrating', isSelected && shouldVibrate);
        button.classList.remove('dot-above', 'dot-center', 'dot-below');
        button.setAttribute('aria-pressed', String(isSelected));

        if (isSelected) {
          button.classList.add(`dot-${indicatorState}`);
        }
      });
    }

    function updateReferenceUI() {
      referenceValue.textContent = formatReference();
      stringButtons.forEach((button, index) => {
        const note = currentTuning.notes[index];
        const ring = button.querySelector('.ring');
        ring.textContent = note;
        button.setAttribute('aria-label', `Välj sträng ${note}`);
      });
      applyStringUI();
    }

    function selectString(index) {
      selectedStringIndex = index;
      indicatorState = 'below';
      shouldVibrate = false;
      updateReferenceUI();
      const note = getSelectedNote();
      setStatus(`${note} vald.`);
    }

    function renderTuningOptions() {
      tuningMenu.innerHTML = '';
      TUNINGS.forEach((tuning) => {
        const option = document.createElement('button');
        option.type = 'button';
        option.className = 'tuning-option';
        option.textContent = tuning.menuLabel;
        option.setAttribute('role', 'option');
        option.setAttribute('aria-current', String(tuning.id === currentTuning.id));
        option.addEventListener('click', () => {
          currentTuning = tuning;
          tuningLabel.textContent = tuning.label;
          tuningDropdown.open = false;
          indicatorState = 'below';
          shouldVibrate = false;
          pitchHistory = [];
          renderTuningOptions();
          updateReferenceUI();
          setStatus(`${tuning.label} vald.`);
        });
        tuningMenu.appendChild(option);
      });
    }

    function clearDetectedPitch(keepNote = true) {
      frequencyValue.textContent = '0.0';
      noteValue.textContent = keepNote ? lastDisplayedNote : '—';
      indicatorState = 'below';
      shouldVibrate = false;
      applyStringUI();
    }

    function updateIndicatorState(pitch) {
      const cents = centsOff(getSelectedFrequency(), pitch);
      if (Math.abs(cents) <= 4) {
        indicatorState = 'center';
      } else if (cents < 0) {
        indicatorState = 'below';
      } else {
        indicatorState = 'above';
      }
    }

    function updatePitchUI(pitch) {
      const noteName = midiToNoteName(frequencyToMidi(pitch));
      lastDisplayedNote = noteName;
      frequencyValue.textContent = pitch.toFixed(1);
      noteValue.textContent = noteName;
      updateIndicatorState(pitch);
      shouldVibrate = getNearestStringIndex(pitch) === selectedStringIndex;
      applyStringUI();
      lastDetectedPitchAt = performance.now();

      const direction = indicatorState === 'below'
        ? 'för låg, stäm upp.'
        : indicatorState === 'above'
          ? 'för hög, stäm ner.'
          : 'är i ton.';
      setStatus(`${getSelectedNote()} vald, ${noteName} ${direction}`);
    }

    function cleanupAudio() {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = 0;
      }

      if (sourceNode) {
        try {
          sourceNode.disconnect();
        } catch (error) {
          console.warn(error);
        }
      }

      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
      }

      sourceNode = null;
      mediaStream = null;
      analyser = null;
      sampleBuffer = null;
    }

    async function stopListening() {
      cleanupAudio();

      if (audioContext && audioContext.state !== 'closed') {
        try {
          await audioContext.close();
        } catch (error) {
          console.warn(error);
        }
      }

      audioContext = null;
      isListening = false;
      pitchHistory = [];
      microphoneButton.textContent = 'Activate microphone';
      clearDetectedPitch(true);
      setStatus('Mikrofonen är avstängd.');
    }

    function detectPitch() {
      if (!isListening || !analyser || !sampleBuffer || !audioContext) return;

      analyser.getFloatTimeDomainData(sampleBuffer);
      const rawPitch = autoCorrelate(sampleBuffer, audioContext.sampleRate);

      if (rawPitch !== -1) {
        pitchHistory.push(rawPitch);
        if (pitchHistory.length > 5) pitchHistory.shift();
        const stablePitch = median(pitchHistory) || rawPitch;
        updatePitchUI(stablePitch);
      } else if (performance.now() - lastDetectedPitchAt > 350) {
        pitchHistory = [];
        clearDetectedPitch(true);
      }

      if (performance.now() - lastDetectedPitchAt > 120) {
        shouldVibrate = false;
        applyStringUI();
      }

      animationFrameId = requestAnimationFrame(detectPitch);
    }

    async function startListening() {
      if (!navigator.mediaDevices?.getUserMedia) {
        setStatus('Den här webbläsaren stöder inte mikrofonåtkomst.');
        return;
      }

      microphoneButton.disabled = true;
      setStatus('Ber om mikrofonåtkomst.');

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
          },
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 4096;
        analyser.smoothingTimeConstant = 0.12;

        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        sourceNode.connect(analyser);

        sampleBuffer = new Float32Array(analyser.fftSize);
        isListening = true;
        pitchHistory = [];
        lastDetectedPitchAt = 0;
        microphoneButton.textContent = 'stop microphone';
        microphoneButton.disabled = false;
        setStatus(`${getSelectedNote()} vald. Spela strängen nära mikrofonen.`);
        detectPitch();
      } catch (error) {
        console.error(error);
        cleanupAudio();

        if (audioContext && audioContext.state !== 'closed') {
          try {
            await audioContext.close();
          } catch (closeError) {
            console.warn(closeError);
          }
        }

        audioContext = null;
        microphoneButton.textContent = 'Activate microphone';
        microphoneButton.disabled = false;
        setStatus('Kunde inte starta mikrofonen. Kontrollera mikrofonbehörigheten i webbläsaren.');
      }
    }

    microphoneButton.addEventListener('click', () => {
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });

    stringButtons.forEach((button) => {
      button.addEventListener('click', () => {
        selectString(Number(button.dataset.index));
      });
    });

    document.addEventListener('click', (event) => {
      if (!tuningDropdown.contains(event.target)) {
        tuningDropdown.open = false;
      }
    });

    document.addEventListener('visibilitychange', async () => {
      if (!audioContext || !isListening) return;

      if (document.hidden) {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = 0;
        }
      } else {
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }
        detectPitch();
      }
    });

    tuningLabel.textContent = currentTuning.label;
    renderTuningOptions();
    updateReferenceUI();
    setStatus('E2 vald. Aktivera mikrofonen.');
  </script>
</body>
</html>
