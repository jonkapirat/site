<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Guitar tuner</title>
  <style>
    :root {
      --bg: #F5F5F2;
      --ink: #212325;
      --surface: #ffffff;
      --stage-max-width: 380px;
      --strings-width: min(76vw, 288px);
      --ring-size: 40px;
      --dot-size: 18px;
      --string-width: 2px;
      --ring-center-y: 50%;
      --card-width: 124px;
      --card-height: 82px;
      --card-gap: 22px;
      --safe-top: max(env(safe-area-inset-top), 0px);
      --safe-bottom: max(env(safe-area-inset-bottom), 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100svh;
    }

    button {
      font: inherit;
    }

    .app-shell {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      background: var(--bg);
    }

    .tuner-stage {
      position: relative;
      min-height: 100svh;
      max-width: var(--stage-max-width);
      margin: 0 auto;
      background: var(--bg);
      isolation: isolate;
    }

    .microphone-button {
      position: absolute;
      top: calc(var(--safe-top) + 20px);
      left: 10px;
      z-index: 10;
      min-width: 152px;
      min-height: 36px;
      padding: 0 22px;
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: #ffffff;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.03em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease;
      box-shadow: none;
      white-space: nowrap;
    }

    .microphone-button:active {
      transform: scale(0.98);
    }

    .strings-layer {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: var(--strings-width);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
    }

    .string-column {
      position: relative;
      display: block;
      width: 100%;
      min-height: 100svh;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      touch-action: manipulation;
      cursor: pointer;
    }

    .string-column:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: -2px;
    }

    .string-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: var(--string-width);
      background: var(--ink);
      transform: translateX(-50%);
      transform-origin: center center;
      z-index: 0;
      will-change: transform;
    }

    .string-column.is-vibrating .string-line {
      animation: string-vibrate 120ms linear infinite;
    }

    .ring {
      position: absolute;
      left: 50%;
      top: var(--ring-center-y);
      width: var(--ring-size);
      height: var(--ring-size);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid var(--ink);
      background: var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
      font-size: 21px;
      font-weight: 500;
      letter-spacing: -0.05em;
      line-height: 1;
      z-index: 2;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .string-column.is-selected .ring {
      background: var(--ink);
      color: #ffffff;
    }

    .tuning-dot {
      position: absolute;
      left: 50%;
      width: var(--dot-size);
      height: var(--dot-size);
      border-radius: 50%;
      border: 2px solid var(--ink);
      background: var(--bg);
      transform: translate(-50%, 0);
      z-index: 1;
      opacity: 0;
      transition:
        top 170ms ease,
        transform 170ms ease,
        background 170ms ease,
        opacity 170ms ease;
    }

    .string-column.is-selected .tuning-dot {
      opacity: 1;
    }

    .string-column.dot-below .tuning-dot {
      top: calc(var(--ring-center-y) + (var(--ring-size) * 0.5) + 7px);
    }

    .string-column.dot-above .tuning-dot {
      top: calc(var(--ring-center-y) - (var(--ring-size) * 0.5) - var(--dot-size) - 7px);
    }

    .string-column.dot-center .tuning-dot {
      top: calc(var(--ring-center-y) + (var(--ring-size) * 0.5) + 7px);
      background: var(--ink);
      transform: translate(-50%, 0) scale(0.78);
    }

    .readout-stack {
      position: absolute;
      left: 50%;
      top: calc(var(--ring-center-y) + clamp(116px, 17.5svh, 132px));
      transform: translateX(-50%);
      z-index: 5;
      display: grid;
      gap: var(--card-gap);
      width: var(--card-width);
      pointer-events: none;
    }

    .readout-card {
      width: 100%;
      min-height: var(--card-height);
      background: var(--surface);
      border-radius: 28px;
      padding: 14px 12px 12px;
      display: grid;
      place-items: center;
      align-content: center;
      box-shadow: 0 0 0 1px rgba(33, 35, 37, 0.02);
    }

    .readout-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 9px;
    }

    .readout-value {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.06em;
      line-height: 0.95;
    }

    .readout-value.large {
      font-size: 31px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes string-vibrate {
      0% {
        transform: translateX(-50%);
      }
      20% {
        transform: translateX(calc(-50% - 1.1px));
      }
      40% {
        transform: translateX(calc(-50% + 1.6px));
      }
      60% {
        transform: translateX(calc(-50% - 0.8px));
      }
      80% {
        transform: translateX(calc(-50% + 1.1px));
      }
      100% {
        transform: translateX(-50%);
      }
    }

    @media (max-width: 359px) {
      :root {
        --strings-width: min(78vw, 272px);
        --ring-size: 38px;
        --dot-size: 17px;
        --card-width: 118px;
        --card-height: 78px;
      }

      .microphone-button {
        left: 10px;
        min-width: 144px;
        padding: 0 18px;
        font-size: 16px;
      }

      .ring {
        font-size: 20px;
      }

      .readout-label {
        font-size: 12px;
      }

      .readout-value {
        font-size: 24px;
      }

      .readout-value.large {
        font-size: 29px;
      }
    }

    @media (min-width: 401px) {
      .microphone-button {
        left: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0ms !important;
        transition-duration: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="tuner-stage" aria-label="Gitarrstämmare">
      <button id="microphoneButton" class="microphone-button" type="button">Activate microphone</button>

      <div id="stringsLayer" class="strings-layer" aria-label="Sex gitarrsträngar">
        <button class="string-column" type="button" data-string-id="E2" aria-label="Låg E-sträng">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">E</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
        <button class="string-column" type="button" data-string-id="A2" aria-label="A-sträng">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">A</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
        <button class="string-column" type="button" data-string-id="D3" aria-label="D-sträng">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">D</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
        <button class="string-column" type="button" data-string-id="G3" aria-label="G-sträng">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">G</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
        <button class="string-column" type="button" data-string-id="B3" aria-label="B-sträng">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">B</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
        <button class="string-column" type="button" data-string-id="E4" aria-label="Hög E-sträng">
          <span class="string-line" aria-hidden="true"></span>
          <span class="ring" aria-hidden="true">E</span>
          <span class="tuning-dot" aria-hidden="true"></span>
        </button>
      </div>

      <section class="readout-stack" aria-live="polite">
        <div class="readout-card">
          <div class="readout-label">Hz</div>
          <div id="frequencyValue" class="readout-value large">0.0</div>
        </div>
        <div class="readout-card">
          <div class="readout-label">Ton nu</div>
          <div id="noteValue" class="readout-value large">—</div>
        </div>
      </section>

      <div id="statusText" class="sr-only" aria-live="polite">Mikrofonen är avstängd.</div>
    </section>
  </main>

  <script>
    const STRINGS = [
      { id: 'E2', label: 'E', display: 'Låg E', freq: 82.41, midi: 40 },
      { id: 'A2', label: 'A', display: 'A', freq: 110.0, midi: 45 },
      { id: 'D3', label: 'D', display: 'D', freq: 146.83, midi: 50 },
      { id: 'G3', label: 'G', display: 'G', freq: 196.0, midi: 55 },
      { id: 'B3', label: 'B', display: 'B', freq: 246.94, midi: 59 },
      { id: 'E4', label: 'E', display: 'Hög E', freq: 329.63, midi: 64 },
    ];

    const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const microphoneButton = document.getElementById('microphoneButton');
    const frequencyValue = document.getElementById('frequencyValue');
    const noteValue = document.getElementById('noteValue');
    const statusText = document.getElementById('statusText');
    const stringButtons = Array.from(document.querySelectorAll('.string-column'));

    let audioContext = null;
    let analyser = null;
    let mediaStream = null;
    let sourceNode = null;
    let sampleBuffer = null;
    let rafId = 0;
    let isListening = false;
    let selectedStringId = null;
    let lastDetectedAt = 0;
    let lastDisplayedNote = '—';

    function setStatus(message) {
      statusText.textContent = message;
    }

    function frequencyToMidi(freq) {
      return 69 + (12 * Math.log2(freq / 440));
    }

    function midiToNoteName(midi) {
      const rounded = Math.round(midi);
      const name = NOTE_NAMES[((rounded % 12) + 12) % 12];
      const octave = Math.floor(rounded / 12) - 1;
      return `${name}${octave}`;
    }

    function centsOff(targetFreq, actualFreq) {
      return 1200 * Math.log2(actualFreq / targetFreq);
    }

    function getSelectedString() {
      return STRINGS.find((item) => item.id === selectedStringId) || null;
    }

    function updateSelectedString(nextId) {
      selectedStringId = nextId;

      stringButtons.forEach((button) => {
        const isSelected = button.dataset.stringId === nextId;
        button.classList.toggle('is-selected', isSelected);
        button.classList.remove('is-vibrating', 'dot-above', 'dot-center');
        button.classList.toggle('dot-below', isSelected);
      });

      if (nextId) {
        const selected = getSelectedString();
        setStatus(`${selected.display} vald.`);
      } else {
        setStatus('Ingen sträng vald.');
      }
    }

    function resetReadout(keepLastNote = false) {
      frequencyValue.textContent = '0.0';
      noteValue.textContent = keepLastNote ? lastDisplayedNote : '—';
      stringButtons.forEach((button) => {
        button.classList.remove('is-vibrating', 'dot-above', 'dot-center');
        button.classList.toggle('dot-below', button.dataset.stringId === selectedStringId);
      });
    }

    function stopDetectLoop() {
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = 0;
      }
    }

    async function stopListening() {
      stopDetectLoop();

      if (sourceNode) {
        try {
          sourceNode.disconnect();
        } catch (error) {
          console.warn(error);
        }
      }

      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
      }

      if (audioContext && audioContext.state !== 'closed') {
        try {
          await audioContext.close();
        } catch (error) {
          console.warn(error);
        }
      }

      audioContext = null;
      analyser = null;
      mediaStream = null;
      sourceNode = null;
      sampleBuffer = null;
      isListening = false;
      microphoneButton.textContent = 'Activate microphone';
      resetReadout(true);
      setStatus('Mikrofonen är avstängd.');
    }

    function autoCorrelate(buffer, sampleRate) {
      const size = buffer.length;
      let rms = 0;

      for (let i = 0; i < size; i += 1) {
        const value = buffer[i];
        rms += value * value;
      }
      rms = Math.sqrt(rms / size);
      if (rms < 0.015) return -1;

      let r1 = 0;
      let r2 = size - 1;
      const threshold = 0.2;

      for (let i = 0; i < size / 2; i += 1) {
        if (Math.abs(buffer[i]) < threshold) {
          r1 = i;
          break;
        }
      }

      for (let i = 1; i < size / 2; i += 1) {
        if (Math.abs(buffer[size - i]) < threshold) {
          r2 = size - i;
          break;
        }
      }

      const trimmed = buffer.slice(r1, r2);
      const newSize = trimmed.length;
      const correlations = new Array(newSize).fill(0);

      for (let lag = 0; lag < newSize; lag += 1) {
        let sum = 0;
        for (let i = 0; i < newSize - lag; i += 1) {
          sum += trimmed[i] * trimmed[i + lag];
        }
        correlations[lag] = sum;
      }

      let dip = 0;
      while (dip + 1 < newSize && correlations[dip] >= correlations[dip + 1]) {
        dip += 1;
      }

      let maxPosition = -1;
      let maxValue = -1;
      for (let i = dip; i < newSize; i += 1) {
        if (correlations[i] > maxValue) {
          maxValue = correlations[i];
          maxPosition = i;
        }
      }

      if (maxPosition <= 0) return -1;

      const x1 = correlations[maxPosition - 1] || correlations[maxPosition];
      const x2 = correlations[maxPosition];
      const x3 = correlations[maxPosition + 1] || correlations[maxPosition];
      const a = (x1 + x3 - (2 * x2)) / 2;
      const b = (x3 - x1) / 2;
      const shift = a ? (-b / (2 * a)) : 0;
      const period = maxPosition + shift;

      if (!period || !Number.isFinite(period)) return -1;

      const frequency = sampleRate / period;
      if (frequency < 70 || frequency > 370) return -1;
      return frequency;
    }

    function updateSelectedStringFeedback(pitch) {
      const selected = getSelectedString();
      const targetButton = selectedStringId
        ? stringButtons.find((button) => button.dataset.stringId === selectedStringId)
        : null;

      stringButtons.forEach((button) => {
        if (button !== targetButton) {
          button.classList.remove('is-vibrating', 'dot-above', 'dot-center');
          button.classList.toggle('dot-below', button.dataset.stringId === selectedStringId);
        }
      });

      if (!selected || !targetButton || !Number.isFinite(pitch)) return;

      const midiDistance = Math.abs(frequencyToMidi(pitch) - selected.midi);
      const cents = centsOff(selected.freq, pitch);
      const shouldAnimate = midiDistance <= 2.5;

      targetButton.classList.toggle('is-vibrating', shouldAnimate);
      targetButton.classList.remove('dot-above', 'dot-center', 'dot-below');

      if (Math.abs(cents) <= 4) {
        targetButton.classList.add('dot-center');
      } else if (cents > 0) {
        targetButton.classList.add('dot-above');
      } else {
        targetButton.classList.add('dot-below');
      }
    }

    function updateReadout(pitch) {
      const midi = frequencyToMidi(pitch);
      const noteName = midiToNoteName(midi);
      lastDisplayedNote = noteName;
      frequencyValue.textContent = pitch.toFixed(1);
      noteValue.textContent = noteName;
      updateSelectedStringFeedback(pitch);
      lastDetectedAt = performance.now();
      setStatus('Lyssnar efter ton.');
    }

    function detectPitch() {
      if (!analyser || !sampleBuffer || !audioContext || !isListening) return;

      analyser.getFloatTimeDomainData(sampleBuffer);
      const pitch = autoCorrelate(sampleBuffer, audioContext.sampleRate);

      if (pitch !== -1) {
        updateReadout(pitch);
      } else if (performance.now() - lastDetectedAt > 450) {
        frequencyValue.textContent = '0.0';
        updateSelectedStringFeedback(NaN);
      }

      rafId = requestAnimationFrame(detectPitch);
    }

    async function startListening() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('Din webbläsare stödjer inte mikrofonåtkomst.');
        return;
      }

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
          },
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 4096;
        analyser.smoothingTimeConstant = 0.15;
        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        sourceNode.connect(analyser);
        sampleBuffer = new Float32Array(analyser.fftSize);
        isListening = true;
        lastDetectedAt = 0;
        microphoneButton.textContent = 'stop microphone';
        setStatus('Mikrofonen är på.');
        detectPitch();
      } catch (error) {
        console.error(error);
        await stopListening();
        setStatus('Kunde inte starta mikrofonen. Kontrollera tillstånd i webbläsaren.');
      }
    }

    microphoneButton.addEventListener('click', async () => {
      if (isListening) {
        await stopListening();
      } else {
        await startListening();
      }
    });

    stringButtons.forEach((button) => {
      button.addEventListener('click', () => {
        updateSelectedString(button.dataset.stringId);
        if (!isListening) {
          resetReadout(true);
        }
      });
    });

    document.addEventListener('visibilitychange', async () => {
      if (!audioContext || !isListening) return;
      if (document.hidden) {
        stopDetectLoop();
      } else {
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }
        detectPitch();
      }
    });

    updateSelectedString(null);
    resetReadout(false);
  </script>
</body>
</html>
